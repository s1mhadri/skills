<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --paper: #ffffff;
      --ink: #17202a;
      --muted: #5d6978;
      --line: #d9dee7;
      --accent: #0f766e;
      --code-bg: #101828;
      --code-ink: #ecfdf5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    main {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(24px, 4vw, 48px);
    }
    h1, h2, h3, h4 {
      line-height: 1.2;
      margin: 1.5em 0 0.55em;
    }
    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
    }
    h2 {
      border-top: 1px solid var(--line);
      padding-top: 1em;
    }
    p, ul, ol, pre, blockquote { margin: 0 0 1.1em; }
    li { margin: 0.25em 0; }
    a { color: var(--accent); }
    code {
      background: #eef2f7;
      border-radius: 4px;
      padding: 0.1em 0.3em;
      font-size: 0.92em;
    }
    pre {
      overflow-x: auto;
      background: var(--code-bg);
      color: var(--code-ink);
      border-radius: 8px;
      padding: 0;
    }
    pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }
    .code-block code {
      display: grid;
      min-width: max-content;
      padding: 14px 0;
    }
    .code-line {
      display: grid;
      grid-template-columns: 4ch 1fr;
      min-height: 1.45em;
    }
    .line-number {
      user-select: none;
      color: #8ea0b8;
      padding: 0 12px;
      text-align: right;
      border-right: 1px solid rgba(255, 255, 255, 0.16);
    }
    .line-code {
      padding: 0 16px;
      white-space: pre;
    }
    blockquote {
      border-left: 4px solid var(--accent);
      color: var(--muted);
      padding-left: 16px;
    }
    .tutorial-header {
      margin-bottom: 20px;
    }
    .tutorial-footer {
      margin-top: 20px;
    }
    .page-nav {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .page-nav-link {
      display: block;
      min-height: 76px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      text-decoration: none;
    }
    .page-nav-link span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 4px;
    }
    .page-nav-link strong {
      display: block;
      line-height: 1.25;
    }
    .page-nav-home {
      text-align: center;
    }
    .page-nav-next {
      text-align: right;
    }
    .page-nav-spacer {
      min-height: 76px;
    }
    @media (max-width: 640px) {
      .page-nav {
        grid-template-columns: 1fr;
      }
      .page-nav-home,
      .page-nav-next {
        text-align: left;
      }
      .page-nav-spacer {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="tutorial-header">
{{header_nav}}
    </header>
    <main>
{{body}}
    </main>
    <footer class="tutorial-footer">
{{footer_nav}}
    </footer>
  </div>
</body>
</html>
